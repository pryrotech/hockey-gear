# ============================================
# HockeyGear – Defender Baseline
# ITSG‑33 Annex 3 & 4 Aligned
# ============================================

controls:

  # -------------------------
  # Endpoint – Core Protection
  # -------------------------

  - id: DEF-RT-1
    title: "Real-time Protection Enabled"
    standard: "ITSG-33"
    annex:
      - "Annex 3 – Security Controls"
      - "Annex 4 – Assessment Procedures"
    control_family: "SI – System and Information Integrity"
    control_id: "SI-3"
    control_name: "Malicious Code Protection"
    service: "Defender"
    category: "Endpoint"
    description: >
      Real-time protection must be enabled to detect and block malware
      at the time of execution.
    expected_value: true
    actual_value: null
    severity: high
    impact: >
      Disabling real-time protection significantly increases exposure
      to malware and ransomware.
    assessment_procedure:
      method: "Automated"
      steps:
        - "Query Defender endpoint configuration"
        - "Validate real-time protection state"
    rationale:
      - "Supports ITSG‑33 SI‑3 malicious code protection"
      - "Aligned with CCCS endpoint protection expectations"
    references:
      - "CCCS M365 Baseline – Endpoint Protection"
    status: "NotEvaluated"
    tags:
      - defender
      - endpoint
      - itsg33

  - id: DEF-CDP-1
    title: "Cloud-delivered Protection Enabled"
    standard: "ITSG-33"
    annex:
      - "Annex 3 – Security Controls"
      - "Annex 4 – Assessment Procedures"
    control_family: "SI – System and Information Integrity"
    control_id: "SI-3"
    control_name: "Malicious Code Protection"
    service: "Defender"
    category: "Endpoint"
    description: >
      Cloud-delivered protection must be enabled to leverage up-to-date
      threat intelligence and rapid signature updates.
    expected_value: true
    actual_value: null
    severity: high
    impact: >
      Without cloud-delivered protection, endpoints rely on stale
      signatures and miss emerging threats.
    assessment_procedure:
      method: "Automated"
      steps:
        - "Query cloud-delivered protection state"
    rationale:
      - "Supports ITSG‑33 SI‑3 ongoing malicious code protection"
      - "Aligned with modern endpoint security practices"
    references:
      - "Microsoft Defender Antivirus configuration guidance"
    status: "NotEvaluated"
    tags:
      - defender
      - endpoint
      - itsg33

  - id: DEF-TP-1
